<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Carte Offline - Relevé Terrain</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --primary: #3b82f6; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { padding: 10px; background: var(--card); text-align: center; font-weight: bold; border-bottom: 1px solid #334155; }
        #controls { padding: 15px; display: flex; flex-direction: column; gap: 8px; background: var(--card); }
        #map { flex: 1; width: 100%; background: #000; }
        #debug-log { height: 80px; background: #000; color: #10b981; font-family: monospace; font-size: 10px; padding: 5px; overflow-y: auto; border-top: 1px solid #334155; white-space: pre-wrap; }
        select, input { padding: 12px; border-radius: 5px; border: 1px solid #334155; background: #0f172a; color: white; width: 100%; box-sizing: border-box; }
        #status { font-size: 13px; color: #3b82f6; font-weight: bold; }
        .action-buttons { display: flex; padding: 10px; gap: 10px; background: var(--card); }
        button { cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<header>CARTE OFFLINE</header>

<div id="controls">
    <div id="status">En attente de fichier ZIP...</div>
    <input type="file" id="zipInput" accept=".zip">
    <select id="levelSelect">
        <option value="rdc">RDC</option>
        <option value="n-1" selected>N-1</option>
        <option value="n+1">N+1</option>
        <option value="n+2">N+2</option>
    </select>
</div>

<div id="map"></div>

<div class="action-buttons">
    <button onclick="sendCsvByEmail()" style="background: #10b981; color: white; padding: 12px; border: none; border-radius: 5px; flex: 1;">📧 Envoyer CSV</button>
    <button onclick="clearCsv()" style="background: #ef4444; color: white; padding: 12px; border: none; border-radius: 5px; flex: 1;">🗑️ Vider Liste</button>
</div>

<!-- Modal de saisie -->
<div id="equipmentModal" style="display:none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--card); padding: 20px; z-index: 2000; border: 1px solid #334155; width: 85%; border-radius: 10px; box-shadow: 0 10px 25px rgba(0,0,0,0.5);">
    <h3 style="margin-top:0;">Nouvel Équipement</h3>
    <label>Nom du Tag :</label>
    <input type="text" id="tagName" placeholder="ex: PT-101" style="margin-bottom:10px;">
    
    <label>Type :</label>
    <select id="tagType" style="margin-bottom:10px;">
        <option value="Instrumentation">Instrumentation</option>
        <option value="Moteur">Moteur</option>
        <option value="Armoire">Armoire</option>
        <option value="Autre">Autre</option>
    </select>

    <label>Photo :</label>
    <input type="file" id="photoInput" accept="image/*" capture="environment" style="margin-bottom:10px;">
    
    <div style="margin-top: 15px; display: flex; gap: 10px;">
        <button onclick="saveEquipment()" style="background: var(--primary); color: white; border: none; padding: 12px; flex: 1; border-radius:5px;">Enregistrer</button>
        <button onclick="closeModal()" style="background: #64748b; color: white; border: none; padding: 12px; flex: 1; border-radius:5px;">Annuler</button>
    </div>
</div>

<div id="debug-log">--- Logs Système ---<br></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<script>
    const logElement = document.getElementById('debug-log');
    const status = document.getElementById('status');
    const cacheName = 'offline-maps-v1';
    let map = L.map('map').setView([0, 0], 2);
    let currentLayer = null;
    let equipmentData = JSON.parse(localStorage.getItem('equipments') || '[]');
    let tempCoords = null;

    function logger(msg) {
        const entry = document.createElement('div');
        entry.textContent = `> ${msg}`;
        logElement.appendChild(entry);
        logElement.scrollTop = logElement.scrollHeight;
    }

    // --- SERVICE WORKER ---
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js')
            .then(reg => logger("Service Worker : ✅ Enregistré"))
            .catch(err => logger("Service Worker : ❌ Erreur : " + err));
    }

    // --- IMPORTATION ZIP ---
    document.getElementById('zipInput').addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        status.innerText = "Importation...";
        try {
            const zip = await JSZip.loadAsync(file);
            const cache = await caches.open(cacheName);
            let count = 0;

            for (const [path, entry] of Object.entries(zip.files)) {
                if (entry.dir || path.includes('__MACOSX')) continue;

                if (path.match(/\.(png|jpg|jpeg)$/i)) {
                    const blob = await entry.async('blob');
                    let p = path.toLowerCase();
                    const levels = ['rdc', 'n-1', 'n+1', 'n+2'];
                    const segments = p.split('/');
                    let startIndex = segments.findIndex(seg => levels.includes(seg));
                    
                    if (startIndex !== -1) {
                        let finalPath = segments.slice(startIndex).join('/');
                        const virtualUrl = window.location.origin + window.location.pathname.replace('index.html', '') + 'local-tiles/' + finalPath;
                        await cache.put(virtualUrl, new Response(blob));
                        count++;
                    }
                }
            }
            status.innerText = `Succès : ${count} tuiles`;
            logger(`Import terminé : ${count} tuiles en cache.`);
            updateMap();
        } catch (err) {
            logger("ERREUR ZIP : " + err.message);
        }
    });

    function updateMap() {
        const level = document.getElementById('levelSelect').value;
        if (currentLayer) map.removeLayer(currentLayer);

        const baseUrl = window.location.origin + window.location.pathname.replace('index.html', '');
        const tileUrl = baseUrl + 'local-tiles/' + level + '/{z}/{x}/{y}.png';
        
        currentLayer = L.tileLayer(tileUrl, {
            maxZoom: 22,
            minZoom: 0,
            noWrap: true,
            bounds: [[-90, -180], [90, 180]]
        }).addTo(map);

        map.setView([0, 0], 5);
        logger("Niveau affiché : " + level);
        
        // Recharger les marqueurs existants pour ce niveau (optionnel, ici on affiche tout)
        renderMarkers();
    }

    function renderMarkers() {
        // Optionnel : filtrer par niveau si vous voulez n'afficher que les points du niveau sélectionné
        // Pour l'instant on affiche tout pour éviter de perdre des points de vue
        equipmentData.forEach(item => {
            L.circleMarker([item.lat, item.lng], { color: 'yellow', radius: 6 })
             .addTo(map)
             .bindPopup(`<b>${item.tag}</b><br>Niveau: ${item.level}`);
        });
    }

    document.getElementById('levelSelect').addEventListener('change', updateMap);

    // --- CAPTURE ÉQUIPEMENT ---
    map.on('click', (e) => {
        tempCoords = e.latlng;
        document.getElementById('equipmentModal').style.display = 'block';
    });

    function closeModal() {
        document.getElementById('equipmentModal').style.display = 'none';
        document.getElementById('tagName').value = '';
        document.getElementById('photoInput').value = '';
    }

    async function saveEquipment() {
        const tag = document.getElementById('tagName').value;
        const type = document.getElementById('tagType').value;
        const level = document.getElementById('levelSelect').value; // Récupère le niveau actuel
        const photoFile = document.getElementById('photoInput').files[0];

        if (!tag) { alert("Le nom du Tag est obligatoire"); return; }

        if (photoFile) {
            const extension = photoFile.name.split('.').pop();
            const newFileName = `${tag}_${level}.${extension}`;
            const link = document.createElement('a');
            link.href = URL.createObjectURL(photoFile);
            link.download = newFileName;
            link.click();
        }

        const newItem = {
            tag,
            type,
            level: level.toUpperCase(), // Ajout du niveau
            lat: tempCoords.lat.toFixed(6),
            lng: tempCoords.lng.toFixed(6),
            date: new Date().toLocaleString()
        };

        equipmentData.push(newItem);
        localStorage.setItem('equipments', JSON.stringify(equipmentData));

        L.circleMarker(tempCoords, { color: 'yellow', radius: 8 }).addTo(map)
         .bindPopup(`<b>${tag}</b> [${level.toUpperCase()}]<br>${type}`).openPopup();

        logger(`Équipement ${tag} enregistré au niveau ${level}.`);
        closeModal();
    }

    // --- EXPORT CSV ---
    function sendCsvByEmail() {
        if (equipmentData.length === 0) { alert("Le CSV est vide !"); return; }

        // Ajout de la colonne "Niveau" dans l'en-tête
        let csvContent = "Tag;Type;Niveau;Latitude;Longitude;Date\n";
        equipmentData.forEach(item => {
            csvContent += `${item.tag};${item.type};${item.level};${item.lat};${item.lng};${item.date}\n`;
        });

        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        
        const link = document.createElement('a');
        link.href = url;
        link.download = "releve_terrain.csv";
        link.click();

        setTimeout(() => {
            window.location.href = `mailto:?subject=Relevé Terrain&body=Export de ${equipmentData.length} équipements effectué sur le terrain.`;
        }, 1000);
    }

    function clearCsv() {
        if (confirm("Voulez-vous vraiment vider tous les équipements ?")) {
            equipmentData = [];
            localStorage.removeItem('equipments');
            logger("Données vidées.");
            location.reload();
        }
    }
    
    // Initialisation
    window.onload = renderMarkers;
</script>
</body>
</html>
