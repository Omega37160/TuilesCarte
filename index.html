<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Carte Offline N-1</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --primary: #3b82f6; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { padding: 10px; background: var(--card); text-align: center; font-weight: bold; }
        #controls { padding: 15px; display: flex; flex-direction: column; gap: 8px; background: var(--card); }
        #map { flex: 1; width: 100%; background: #000; }
        #debug-log { height: 100px; background: #000; color: #10b981; font-family: monospace; font-size: 10px; padding: 5px; overflow-y: auto; border-top: 1px solid #334155; white-space: pre-wrap; }
        select, input { padding: 10px; border-radius: 5px; border: 1px solid #334155; background: #0f172a; color: white; width: 100%; }
        #status { font-size: 13px; color: #3b82f6; font-weight: bold; }
    </style>
</head>
<body>

<header>CARTE OFFLINE</header>

<div id="controls">
    <div id="status">En attente de fichier ZIP...</div>
    <input type="file" id="zipInput" accept=".zip">
    <select id="levelSelect">
        <option value="rdc">RDC</option>
        <option value="n-1" selected>N-1</option> <!-- Sélectionné par défaut -->
        <option value="n+1">N+1</option>
        <option value="n+2">N+2</option>
    </select>
</div>

<div id="map"></div>
<!-- Boutons d'action -->
<div id="controls" style="flex-direction: row; justify-content: space-between;">
    <button onclick="sendCsvByEmail()" style="background: #10b981; color: white; padding: 10px; border: none; border-radius: 5px; flex: 1; margin-right: 5px;">📧 Envoyer CSV</button>
    <button onclick="clearCsv()" style="background: #ef4444; color: white; padding: 10px; border: none; border-radius: 5px; flex: 1;">🗑️ Vider Liste</button>
</div>

<!-- Modal de saisie -->
<div id="equipmentModal" style="display:none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--card); padding: 20px; z-index: 2000; border: 1px solid #334155; width: 80%; border-radius: 10px;">
    <h3>Nouvel Équipement</h3>
    <!-- Nouveau champ Nom -->
    <input type="text" id="userName" placeholder="Votre Nom (ex: Jean Dupont)" style="margin-bottom: 10px;">
    
    <input type="text" id="tagName" placeholder="Nom du Tag (ex: PT-101)">
    
    <select id="tagType" style="margin-top: 10px;">
        <option value="Instrumentation">Instrumentation</option>
        <option value="Moteur">Moteur</option>
        <option value="Armoire">Armoire</option>
    </select>
    <input type="file" id="photoInput" accept="image/*" capture="environment" style="margin-top: 10px;">
    <div style="margin-top: 15px; display: flex; gap: 10px;">
        <button onclick="saveEquipment()" style="background: var(--primary); color: white; border: none; padding: 10px; flex: 1;">Enregistrer</button>
        <button onclick="closeModal()" style="background: #64748b; color: white; border: none; padding: 10px; flex: 1;">Annuler</button>
    </div>
</div>
<div id="debug-log">--- Logs Système ---<br></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<script>
const logElement = document.getElementById('debug-log');
    const status = document.getElementById('status');
    const cacheName = 'offline-maps-v1';
    
    // On initialise la carte sur un point neutre
    let map = L.map('map').setView([0, 0], 2);
    let currentLayer = null;

    function logger(msg) {
        const entry = document.createElement('div');
        entry.textContent = `> ${msg}`;
        logElement.appendChild(entry);
        logElement.scrollTop = logElement.scrollHeight;
    }

    // --- 1. ENREGISTREMENT ET VERIFICATION DU SW ---
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js')
            .then(reg => logger("Service Worker : ✅ Enregistré"))
            .catch(err => logger("Service Worker : ❌ Erreur : " + err));

        navigator.serviceWorker.ready.then(() => {
            logger("Service Worker : 🚀 Actif et prêt");
        });
    } else {
        logger("Service Worker : ❌ Non supporté sur ce navigateur");
    }

    // --- 2. LOGIQUE D'IMPORTATION ---
    document.getElementById('zipInput').addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        logger("Fichier : " + file.name);
        status.innerText = "Importation...";
        
        try {
            const zip = await JSZip.loadAsync(file);
            const cache = await caches.open(cacheName);
            let count = 0;
            let firstPath = "";

            for (const [path, entry] of Object.entries(zip.files)) {
                if (entry.dir || path.includes('__MACOSX')) continue;

                if (path.match(/\.(png|jpg|jpeg)$/i)) {
                    const blob = await entry.async('blob');
                    let p = path.toLowerCase();
                    
                    const levels = ['rdc', 'n-1', 'n+1', 'n+2'];
                    const segments = p.split('/');
                    let startIndex = segments.findIndex(seg => levels.includes(seg));
                    
                    if (startIndex !== -1) {
                        let finalPath = segments.slice(startIndex).join('/');
                        // On construit l'URL exacte que Leaflet va demander
                        const virtualUrl = window.location.origin + window.location.pathname.replace('index.html', '') + 'local-tiles/' + finalPath;
                        
                        await cache.put(virtualUrl, new Response(blob));
                        if(count === 0) firstPath = virtualUrl;
                        count++;
                    }
                }
            }

            status.innerText = `Succès : ${count} tuiles`;
            logger(`Import terminé. ${count} images en cache.`);
            
            // --- TEST DE CACHE IMMEDIAT ---
            if(firstPath) {
                const match = await caches.match(firstPath);
                logger(match ? "✅ Test Cache : OK" : "❌ Test Cache : ÉCHEC (URL mal formée)");
                logger("URL testée : " + firstPath);
            }

            updateMap();
        } catch (err) {
            logger("ERREUR ZIP : " + err.message);
        }
    });

    function updateMap() {
        const level = document.getElementById('levelSelect').value;
        if (currentLayer) map.removeLayer(currentLayer);

        // Construction de l'URL pour Leaflet
        const baseUrl = window.location.origin + window.location.pathname.replace('index.html', '');
        const tileUrl = baseUrl + 'local-tiles/' + level + '/{z}/{x}/{y}.png';
        
        logger("Affichage niveau : " + level);

        currentLayer = L.tileLayer(tileUrl, {
            maxZoom: 22,
            minZoom: 0,
            noWrap: true,
            bounds: [[-90, -180], [90, 180]] // Empêche de chercher des tuiles à l'infini
        }).addTo(map);

        // Si on a des tuiles au zoom 5, on force le zoom pour "voir" quelque chose
        map.setView([0, 0], 5); 
    }

    document.getElementById('levelSelect').addEventListener('change', updateMap);

    map.on('click', (e) => {
        L.circleMarker(e.latlng, { color: 'red', radius: 5 }).addTo(map);
        logger(`Clic : ${e.latlng.lat.toFixed(4)}, ${e.latlng.lng.toFixed(4)}`);
    });

    let equipmentData = JSON.parse(localStorage.getItem('equipments') || '[]');
let tempCoords = null;

// Remplacer l'événement de clic existant
map.on('click', (e) => {
    tempCoords = e.latlng;
    document.getElementById('equipmentModal').style.display = 'block';
});

function closeModal() {
    document.getElementById('equipmentModal').style.display = 'none';
    document.getElementById('tagName').value = '';
}

async function saveEquipment() {
    const nom = document.getElementById('userName').value; // Nouveau
    const tag = document.getElementById('tagName').value;
    const type = document.getElementById('tagType').value;
    const niveau = document.getElementById('levelSelect').value; // Récupère le niveau actuel
    const photoFile = document.getElementById('photoInput').files[0];

    if (!tag || !nom) { alert("Le nom et le Tag sont obligatoires"); return; }

    if (photoFile) {
        const extension = photoFile.name.split('.').pop();
        const newFileName = `${tag}.${extension}`;
        const link = document.createElement('a');
        link.href = URL.createObjectURL(photoFile);
        link.download = newFileName;
        link.click();
        logger(`Photo enregistrée : ${newFileName}`);
    }

    // Préparation de l'objet sans la date, mais avec Nom et Niveau
    const newItem = {
        nom,
        tag,
        type,
        niveau, // Ajout du niveau
        lat: tempCoords.lat.toFixed(6),
        lng: tempCoords.lng.toFixed(6)
    };

    equipmentData.push(newItem);
    localStorage.setItem('equipments', JSON.stringify(equipmentData));

    L.circleMarker(tempCoords, { color: 'yellow', radius: 8 }).addTo(map)
     .bindPopup(`<b>${tag}</b><br>${type} (${niveau})`).openPopup();

    logger(`Équipement ${tag} enregistré au niveau ${niveau}`);
    closeModal();
}

function sendCsvByEmail() {
    if (equipmentData.length === 0) { alert("Le CSV est vide !"); return; }

    // Mise à jour de l'en-tête : Nom;Tag;Type;Niveau;Latitude;Longitude
    let csvContent = "Nom;Tag;Type;Niveau;Latitude;Longitude\n";
    
    equipmentData.forEach(item => {
        csvContent += `${item.nom};${item.tag};${item.type};${item.niveau};${item.lat};${item.lng}\n`;
    });

    const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    
    const link = document.createElement('a');
    link.href = url;
    link.download = "releve_equipements.csv";
    link.click();

    setTimeout(() => {
        window.location.href = `mailto:?subject=Relevé Terrain&body=Bonjour, veuillez trouver ci-joint le relevé CSV comprenant ${equipmentData.length} équipements.`;
    }, 1000);
}
function clearCsv() {
    if (confirm("Voulez-vous vraiment vider tous les équipements enregistrés ?")) {
        equipmentData = [];
        localStorage.removeItem('equipments');
        logger("Données CSV vidées.");
        location.reload(); // Pour rafraîchir la carte
    }
}

</script>
</body>
</html>
