<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Carte Offline Debug</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --primary: #3b82f6; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { padding: 10px; background: var(--card); text-align: center; font-weight: bold; }
        #controls { padding: 15px; display: flex; flex-direction: column; gap: 8px; background: var(--card); }
        #map { flex: 1; width: 100%; background: #000; }
        
        /* Zone de Logs pour Mobile */
        #debug-log { 
            height: 120px; 
            background: #000; 
            color: #10b981; 
            font-family: monospace; 
            font-size: 10px; 
            padding: 5px; 
            overflow-y: auto; 
            border-top: 1px solid #334155;
            white-space: pre-wrap;
        }
        
        select, input { padding: 10px; border-radius: 5px; border: 1px solid #334155; background: #0f172a; color: white; width: 100%; }
        #status { font-size: 13px; color: #3b82f6; font-weight: bold; }
    </style>
</head>
<body>

<header>CARTE OFFLINE DEBUG</header>

<div id="controls">
    <div id="status">En attente de fichier...</div>
    <input type="file" id="zipInput" accept=".zip">
    <select id="levelSelect">
        <option value="rdc">RDC</option>
        <option value="n-1">N-1</option>
        <option value="n+1">N+1</option>
        <option value="n+2">N+2</option>
    </select>
</div>

<div id="map"></div>

<!-- Zone de logs invisible par défaut, utile pour le debug -->
<div id="debug-log">--- Logs Système ---<br></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<script>
    const logElement = document.getElementById('debug-log');
    const status = document.getElementById('status');
    const cacheName = 'offline-maps-v1';
    let map = L.map('map').setView([0, 0], 2);
    let currentLayer = null;

    // Fonction pour écrire les logs sur l'écran du téléphone
    function logger(msg) {
        const entry = document.createElement('div');
        entry.textContent = `> ${msg}`;
        logElement.appendChild(entry);
        logElement.scrollTop = logElement.scrollHeight;
    }

    // --- LOGIQUE D'IMPORTATION ---
    document.getElementById('zipInput').addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        logger("Fichier reçu : " + file.name);
        status.innerText = "Lecture du ZIP...";
        
        try {
            const zip = await JSZip.loadAsync(file);
            const cache = await caches.open(cacheName);
            let count = 0;

            const entries = Object.keys(zip.files);
            logger(`Le ZIP contient ${entries.length} entrées.`);

for (const [path, entry] of Object.entries(zip.files)) {
            // Log de TOUT ce qui passe pour comprendre ce que voit le téléphone
            logger("Analyse : " + path);

            if (entry.dir || path.includes('__MACOSX')) continue;

            if (path.match(/\.(png|jpg|jpeg)$/i)) {
                const blob = await entry.async('blob');
                
                // On transforme le chemin en minuscules : "tiles/n+1/0/0/0.png"
                let p = path.toLowerCase();
                
                // On cherche où commence le niveau (rdc, n-1, n+1, n+2)
                let finalPath = "";
                const segments = p.split('/');
                const levels = ['rdc', 'n-1', 'n+1', 'n+2'];

                // On reconstruit le chemin à partir du nom du niveau
                let startIndex = segments.findIndex(seg => levels.includes(seg));
                
                if (startIndex !== -1) {
                    finalPath = segments.slice(startIndex).join('/');
                } else {
                    // Si on ne trouve pas de dossier de niveau, on prend juste le nom du fichier
                    // Utile si le ZIP est "sale"
                    finalPath = segments.join('/');
                }

                if (finalPath) {
                    const virtualUrl = window.location.origin + '/local-tiles/' + finalPath;
                    await cache.put(virtualUrl, new Response(blob));
                    count++;
                }
            }
        }

            status.innerText = `Succès : ${count} tuiles chargées`;
            logger(`Import terminé. ${count} images mises en cache.`);
            updateMap();
            // Test de lecture immédiat
        } catch (err) {
            logger("ERREUR : " + err.message);
            status.innerText = "Erreur de chargement";
        }
    });

    function updateMap() {
        const level = document.getElementById('levelSelect').value;
        if (currentLayer) map.removeLayer(currentLayer);

        // URL attendue : /local-tiles/n+1/{z}/{x}/{y}.png
        const tileUrl = window.location.origin + '/local-tiles/' + level + '/{z}/{x}/{y}.png';
        logger("Tentative d'affichage : " + level);

        currentLayer = L.tileLayer(tileUrl, {
            maxZoom: 22,
            minZoom: 0,
            noWrap: true
        }).addTo(map);
    }

    document.getElementById('levelSelect').addEventListener('change', updateMap);

    // Marker au clic
    map.on('click', (e) => {
        L.circleMarker(e.latlng, { color: 'red', radius: 5 }).addTo(map);
    });

</script>
</body>
</html>
