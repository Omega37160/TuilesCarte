<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Carte Tuiles Explorer</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        :root {
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --gradient: linear-gradient(135deg, #3b82f6, #6366f1);
            --bg-dark: #0f172a;
            --bg-darker: #020617;
            --glass: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-darker);
            background-image: 
                radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(99, 102, 241, 0.15) 0px, transparent 50%);
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        header {
            padding: 1.5rem 1rem;
            text-align: center;
            background: var(--glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--glass-border);
            position: sticky;
            top: 0;
            z-index: 1001; /* Above leaflet */
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            background: var(--gradient);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.025em;
        }

        main {
            padding: 1.5rem 1rem;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 1.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -2px rgba(0, 0, 0, 0.1);
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            margin-bottom: 1rem;
        }

        .form-group label {
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-muted);
        }

        input[type="file"].custom-file-input {
            width: 100%;
            padding: 1rem;
            background: rgba(0, 0, 0, 0.2);
            border: 2px dashed var(--glass-border);
            border-radius: 12px;
            color: var(--text-main);
            outline: none;
            cursor: pointer;
            transition: all 0.2s;
        }

        input[type="file"].custom-file-input:hover {
            border-color: var(--primary);
            background: rgba(59, 130, 246, 0.05);
        }

        select {
            width: 100%;
            padding: 0.875rem 1rem;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            color: var(--text-main);
            font-size: 1rem;
            outline: none;
            appearance: none;
            cursor: pointer;
        }

        select:focus {
            border-color: var(--primary);
        }

        select option {
            background: var(--bg-dark);
            color: white;
        }

        .btn {
            background: var(--gradient);
            color: white;
            border: none;
            padding: 0.875rem 1.5rem;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
            transition: opacity 0.2s, transform 0.1s;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--glass-border);
            color: var(--text-main);
        }

        .map-container {
            position: relative;
            width: 100%;
            height: 60vh;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 16px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--glass-border);
        }

        #map {
            width: 100%;
            height: 100%;
            display: none;
            background: transparent; /* Seamless blend */
        }

        .placeholder-text {
            color: var(--text-muted);
            text-align: center;
            padding: 2rem;
            font-size: 0.875rem;
        }

        #cameraInput { display: none; }

        .stats {
            display: flex;
            justify-content: space-between;
            font-size: 0.875rem;
            color: var(--text-muted);
            margin-bottom: 1rem;
        }

        /* Leaflet Overrides for Dark UI */
        .leaflet-container { background: transparent !important; }
        .leaflet-bar a { background-color: var(--bg-dark) !important; color: var(--text-main) !important; border-bottom: 1px solid var(--glass-border) !important; }
        .leaflet-bar a:hover { background-color: var(--primary) !important; }
        .leaflet-control-attribution { display: none; } /* Hide attribution for absolute local tiles */
    </style>
</head>
<body>

    <header>
        <h1>Carte Tuiles Mobile</h1>
    </header>

    <main>
        
        <div class="card">
            <div class="form-group">
                <label for="tuileInput">1. Sélectionner le DOSSIER "tuiles"</label>
                <!-- webkitdirectory allows folder selection, reading subfolders as well -->
                <input type="file" id="tuileInput" class="custom-file-input" webkitdirectory directory multiple>
                <small style="color: var(--text-muted); font-size: 0.75rem; margin-top: 0.25rem;">
                    Cela scannera automatiquement toutes les tuiles xyz des sous-dossiers N-1, RDC, N+1, N+2.
                </small>
            </div>

            <div class="form-group">
                <label for="levelSelect">2. Choisir le niveau affiché</label>
                <select id="levelSelect">
                    <option value="" disabled selected>-- Sélectionnez un niveau --</option>
                    <option value="N-1">N-1</option>
                    <option value="RDC">RDC</option>
                    <option value="N+1">N+1</option>
                    <option value="N+2">N+2</option>
                </select>
            </div>
        </div>

        <div class="card" style="padding: 0;">
            <div class="map-container" id="mapContainer">
                <div class="placeholder-text" id="mapPlaceholder">
                    Aucune tuile chargée.<br><br>
                    Sélectionnez le dossier contenant vos "tuiles xyz.png".
                </div>
                <!-- Leaflet container -->
                <div id="map"></div>
            </div>
        </div>

        <div class="card">
            <div class="stats">
                <span id="equipCount">0 équipement(s) localisé(s)</span>
                <span>Base locale sécurisée</span>
            </div>
            <button class="btn" id="exportBtn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                Exporter les données (CSV)
            </button>
            <button class="btn btn-outline" id="clearBtn" style="margin-top: 1rem; color: #ef4444;">
                Réinitialiser la base
            </button>
        </div>

        <!-- Hidden input for mobile camera trigger -->
        <input type="file" id="cameraInput" accept="image/*" capture="environment">
    </main>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // Database of dynamically generated Blob URLs for each X, Y, Z tile per level
        const localTiles = {
            "N-1": {},
            "RDC": {},
            "N+1": {},
            "N+2": {}
        };
        
        let pendingCoordinates = null; // Store (lat, lng)
        let pendingLevel = null;

        // UI Elements
        const tuileInput = document.getElementById('tuileInput');
        const levelSelect = document.getElementById('levelSelect');
        const mapPlaceholder = document.getElementById('mapPlaceholder');
        const cameraInput = document.getElementById('cameraInput');
        const exportBtn = document.getElementById('exportBtn');
        const clearBtn = document.getElementById('clearBtn');
        const equipCountText = document.getElementById('equipCount');

        let map = null;
        let offlineLayer = null;
        let markersLayer = null;

        // Custom Leaflet Marker Icon
        const redIcon = L.divIcon({
            className: 'custom-div-icon',
            html: '<div style="background-color:#ef4444; width:16px; height:16px; border-radius:50%; border:2px solid white; box-shadow: 0 0 8px rgba(0,0,0,0.5);"></div>',
            iconSize: [16, 16],
            iconAnchor: [8, 8] // Center on point
        });

        // ==== IndexedDB Logic ====
        let db;
        const request = indexedDB.open("CarteTuileDB", 2); // bumped version just in case
        
        request.onupgradeneeded = function(event) {
            db = event.target.result;
            if(!db.objectStoreNames.contains('equipements_geo')) {
                db.createObjectStore('equipements_geo', { keyPath: 'id', autoIncrement: true });
            }
        };

        request.onsuccess = function(event) {
            db = event.target.result;
            refreshMarkersAndCount();
        };

        function saveEquipement(equipementInfo) {
            const tx = db.transaction('equipements_geo', 'readwrite');
            const store = tx.objectStore('equipements_geo');
            store.add(equipementInfo);
            tx.oncomplete = () => {
                refreshMarkersAndCount();
            };
        }

        async function getAllEquipements() {
            return new Promise((resolve) => {
                const tx = db.transaction('equipements_geo', 'readonly');
                const store = tx.objectStore('equipements_geo');
                const req = store.getAll();
                req.onsuccess = () => resolve(req.result);
            });
        }

        async function clearAllEquipements() {
            return new Promise((resolve) => {
                const tx = db.transaction('equipements_geo', 'readwrite');
                const store = tx.objectStore('equipements_geo');
                const req = store.clear();
                req.onsuccess = () => resolve();
            });
        }

        async function refreshMarkersAndCount() {
            const records = await getAllEquipements();
            equipCountText.textContent = `${records.length} équipement(s) localisé(s)`;
            
            if(!markersLayer) return;
            markersLayer.clearLayers();

            const currentLevel = levelSelect.value;
            if(!currentLevel) return;

            records.forEach(r => {
                if(r.niveau === currentLevel && r.lat !== undefined && r.lng !== undefined) {
                    L.marker([r.lat, r.lng], { icon: redIcon }).addTo(markersLayer);
                }
            });
        }

        // ==== File Selection Logic (Folder) ====
        tuileInput.addEventListener('change', (e) => {
            const files = e.target.files;
            let loadedCount = 0;

            for(let i = 0; i < files.length; i++) {
                const file = files[i];
                const path = file.webkitRelativePath.toUpperCase();
                
                let matchedLevel = null;
                if(path.includes('/N-1/') || path.includes('\\N-1\\')) matchedLevel = 'N-1';
                else if(path.includes('/RDC/') || path.includes('\\RDC\\') || path.includes('/REZ/')) matchedLevel = 'RDC';
                else if(path.includes('/N+1/') || path.includes('\\N+1\\')) matchedLevel = 'N+1';
                else if(path.includes('/N+2/') || path.includes('\\N+2\\')) matchedLevel = 'N+2';

                if(matchedLevel) {
                    // Extract XYZ. common formats: z/x/y.png  OR  z_x_y.png OR anything followed by .png
                    // We extract the last 3 numbers before the extension
                    // Regex: find 3 numbers separated by _ or / or \ just before the .png/.ping
                    const match = file.webkitRelativePath.match(/(?:.*[\/\\])?(\d+)[\/\_\\](\d+)[\/\_\\](\d+)\.p[in]g$/i);
                    if (match && match.length === 4) {
                        const z = parseInt(match[1]);
                        const x = parseInt(match[2]);
                        const y = parseInt(match[3]);
                        const key = `${z}/${x}/${y}`;
                        
                        // Cache as a target File (Lazy generation for massive folders)
                        localTiles[matchedLevel][key] = file;
                        loadedCount++;
                    }
                }
            }

            if(loadedCount > 0) {
                // Count how many per level
                const summary = ["N-1", "RDC", "N+1", "N+2"]
                    .map(lvl => `${lvl}: ${Object.keys(localTiles[lvl]).length}`)
                    .join(", ");
                alert(`${loadedCount} tuiles xyz chargées avec succès !\n(${summary})`);
                updateMapDisplay();
            } else {
                alert("Aucune tuile XYZ (format png) trouvée dans ce dossier. Assurez-vous d'avoir sélectionné le dossier racine et que les images y sont.");
            }
        });

        // ==== Custom Offline Leaflet Layer ====
        L.TileLayer.Offline = L.TileLayer.extend({
            getTileUrl: function(coords) {
                const level = levelSelect.value;
                if(!level) return '';
                const key = `${coords.z}/${coords.x}/${coords.y}`;
                
                const item = localTiles[level][key];
                if (!item) return 'data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=';

                // Génération paresseuse (Lazy Loading) de l'URL pour éviter de figer le navigateur
                if (item instanceof File) {
                    const url = URL.createObjectURL(item);
                    localTiles[level][key] = url; // Mise en cache de l'URL générée
                    return url;
                }
                
                return item; // Retourne l'URL déjà générée
            }
        });

        // ==== Map Display Logic ====
        levelSelect.addEventListener('change', updateMapDisplay);

        function updateMapDisplay() {
            const selected = levelSelect.value;
            if(!selected) return;

            const tileKeys = Object.keys(localTiles[selected]);
            
            if(tileKeys.length > 0) {
                mapPlaceholder.style.display = 'none';
                document.getElementById('map').style.display = 'block';

                if(!map) {
                    map = L.map('map').setView([0, 0], 2);

                    offlineLayer = new L.TileLayer.Offline('', {
                        minZoom: 0,
                        maxZoom: 22,
                        tileSize: 256,
                        maxNativeZoom: 20
                    }).addTo(map);

                    markersLayer = L.layerGroup().addTo(map);

                    // Add click to take photo
                    map.on('click', function(e) {
                        pendingCoordinates = { lat: e.latlng.lat, lng: e.latlng.lng };
                        pendingLevel = levelSelect.value;
                        cameraInput.click();
                    });
                }

                // Smoothly focus map on loaded tiles
                centerMapOnTiles(selected);
                
                // Redraw layer since content changed
                offlineLayer.redraw();
                refreshMarkersAndCount();
            } else {
                mapPlaceholder.style.display = 'block';
                document.getElementById('map').style.display = 'none';
                mapPlaceholder.innerHTML = `Aucune tuile xyz trouvée pour le niveau <b>${selected}</b> dans le dossier sélectionné.`;
            }
        }

        function centerMapOnTiles(level) {
            const keys = Object.keys(localTiles[level]);
            if(keys.length === 0) return;
            
            let maxZ = 0;
            keys.forEach(k => {
                const z = parseInt(k.split('/')[0]);
                if(z > maxZ) maxZ = z;
            });

            // Isolate tiles at maxZ bounds to calculate bounding box
            const topTiles = keys.filter(k => k.startsWith(maxZ + '/'));
            let minX = Infinity, maxX = 0, minY = Infinity, maxY = 0;
            
            topTiles.forEach(k => {
                const [z, x, y] = k.split('/').map(Number);
                if (x < minX) minX = x;
                if (x > maxX) maxX = x;
                if (y < minY) minY = y;
                if (y > maxY) maxY = y;
            });

            // Convert Tile coords to LatLng bounds
            if(minX !== Infinity) {
                // Point calculation based on 256px tiles
                const p1 = L.point(minX * 256, minY * 256);
                const p2 = L.point((maxX + 1) * 256, (maxY + 1) * 256);
                
                const latlng1 = map.unproject(p1, maxZ);
                const latlng2 = map.unproject(p2, maxZ);
                
                // Set view and fit cleanly with padding
                const bounds = L.latLngBounds(latlng1, latlng2);
                // Slight delay to allow Leaflet layout to settle
                setTimeout(() => {
                    map.fitBounds(bounds, { padding: [10, 10] });
                }, 100);
            }
        }

        // ==== Hardware Camera Events ====
        cameraInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if(file && pendingCoordinates && pendingLevel) {
                
                const equip = {
                    niveau: pendingLevel,
                    lat: pendingCoordinates.lat,
                    lng: pendingCoordinates.lng,
                    photoBlob: file, 
                    dateCapture: new Date().toISOString()
                };

                saveEquipement(equip);

                pendingCoordinates = null;
                pendingLevel = null;
                cameraInput.value = ''; 
            }
        });

        // ==== Export Logic ====
        exportBtn.addEventListener('click', async () => {
            const records = await getAllEquipements();
            if(records.length === 0) {
                alert("Aucune donnée géographique à exporter.");
                return;
            }

            let csvContent = "Id;Niveau;Latitude;Longitude;DateCapture;PhotoSize(MB)\n";
            records.forEach(r => {
                const mb = (r.photoBlob.size / (1024*1024)).toFixed(2);
                csvContent += `${r.id};${r.niveau};${r.lat.toFixed(6)};${r.lng.toFixed(6)};${r.dateCapture};${mb}\n`;
            });

            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.setAttribute("href", url);
            link.setAttribute("download", "Equipements_Geographiques.csv");
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        });

        // ==== Reset Logic ====
        clearBtn.addEventListener('click', async () => {
            if(confirm("Supprimer toute la base de données de cette PWA ?")) {
                await clearAllEquipements();
                refreshMarkersAndCount();
            }
        });

    </script>
    <!-- Bibliothèque pour lire les ZIP -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<script>
  // 1. Enregistrement du Service Worker pour le mode PWA
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }

  // 2. Fonction pour importer le ZIP dans le cache permanent
  async function importZipToCache(file) {
    const zip = await JSZip.loadAsync(file);
    const cache = await caches.open('offline-maps-v1');
    
    const promises = [];
    zip.forEach((relativePath, zipEntry) => {
      if (!zipEntry.dir && zipEntry.name.match(/\.(png|jpg)$/i)) {
        const p = zipEntry.async('blob').then(blob => {
          // On crée une URL virtuelle stable
          const url = new URL(zipEntry.name, window.location.origin + '/local-tiles/').href;
          return cache.put(url, new Response(blob));
        });
        promises.push(p);
      }
    });

    await Promise.all(promises);
    alert("Importation terminée !");
    location.reload(); // Rafraîchir pour que Leaflet voit les nouvelles tuiles
  }

  // 3. Modifier votre Leaflet pour pointer vers l'URL virtuelle
  // L.tileLayer('/local-tiles/{z}/{x}/{y}.png').addTo(map);
</script>
</body>
</html>
