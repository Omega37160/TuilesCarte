<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Carte Offline N-1</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --primary: #3b82f6; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { padding: 10px; background: var(--card); text-align: center; font-weight: bold; }
        #controls { padding: 15px; display: flex; flex-direction: column; gap: 8px; background: var(--card); }
        #map { flex: 1; width: 100%; background: #000; }
        #debug-log { height: 100px; background: #000; color: #10b981; font-family: monospace; font-size: 10px; padding: 5px; overflow-y: auto; border-top: 1px solid #334155; white-space: pre-wrap; }
        select, input { padding: 10px; border-radius: 5px; border: 1px solid #334155; background: #0f172a; color: white; width: 100%; }
        #status { font-size: 13px; color: #3b82f6; font-weight: bold; }
    </style>
</head>
<body>

<header>CARTE OFFLINE</header>

<div id="controls">
    <div id="status">En attente de fichier ZIP...</div>
    <input type="file" id="zipInput" accept=".zip">
    <select id="levelSelect">
        <option value="rdc">RDC</option>
        <option value="n-1" selected>N-1</option> <!-- Sélectionné par défaut -->
        <option value="n+1">N+1</option>
        <option value="n+2">N+2</option>
    </select>
</div>

<div id="map"></div>
<div id="debug-log">--- Logs Système ---<br></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<script>
const logElement = document.getElementById('debug-log');
    const status = document.getElementById('status');
    const cacheName = 'offline-maps-v1';
    
    // On initialise la carte sur un point neutre
    let map = L.map('map').setView([0, 0], 2);
    let currentLayer = null;

    function logger(msg) {
        const entry = document.createElement('div');
        entry.textContent = `> ${msg}`;
        logElement.appendChild(entry);
        logElement.scrollTop = logElement.scrollHeight;
    }

    // --- 1. ENREGISTREMENT ET VERIFICATION DU SW ---
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js')
            .then(reg => logger("Service Worker : ✅ Enregistré"))
            .catch(err => logger("Service Worker : ❌ Erreur : " + err));

        navigator.serviceWorker.ready.then(() => {
            logger("Service Worker : 🚀 Actif et prêt");
        });
    } else {
        logger("Service Worker : ❌ Non supporté sur ce navigateur");
    }

    // --- 2. LOGIQUE D'IMPORTATION ---
    document.getElementById('zipInput').addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        logger("Fichier : " + file.name);
        status.innerText = "Importation...";
        
        try {
            const zip = await JSZip.loadAsync(file);
            const cache = await caches.open(cacheName);
            let count = 0;
            let firstPath = "";

            for (const [path, entry] of Object.entries(zip.files)) {
                if (entry.dir || path.includes('__MACOSX')) continue;

                if (path.match(/\.(png|jpg|jpeg)$/i)) {
                    const blob = await entry.async('blob');
                    let p = path.toLowerCase();
                    
                    const levels = ['rdc', 'n-1', 'n+1', 'n+2'];
                    const segments = p.split('/');
                    let startIndex = segments.findIndex(seg => levels.includes(seg));
                    
                    if (startIndex !== -1) {
                        let finalPath = segments.slice(startIndex).join('/');
                        // On construit l'URL exacte que Leaflet va demander
                        const virtualUrl = window.location.origin + window.location.pathname.replace('index.html', '') + 'local-tiles/' + finalPath;
                        
                        await cache.put(virtualUrl, new Response(blob));
                        if(count === 0) firstPath = virtualUrl;
                        count++;
                    }
                }
            }

            status.innerText = `Succès : ${count} tuiles`;
            logger(`Import terminé. ${count} images en cache.`);
            
            // --- TEST DE CACHE IMMEDIAT ---
            if(firstPath) {
                const match = await caches.match(firstPath);
                logger(match ? "✅ Test Cache : OK" : "❌ Test Cache : ÉCHEC (URL mal formée)");
                logger("URL testée : " + firstPath);
            }

            updateMap();
        } catch (err) {
            logger("ERREUR ZIP : " + err.message);
        }
    });

    function updateMap() {
        const level = document.getElementById('levelSelect').value;
        if (currentLayer) map.removeLayer(currentLayer);

        // Construction de l'URL pour Leaflet
        const baseUrl = window.location.origin + window.location.pathname.replace('index.html', '');
        const tileUrl = baseUrl + 'local-tiles/' + level + '/{z}/{x}/{y}.png';
        
        logger("Affichage niveau : " + level);

        currentLayer = L.tileLayer(tileUrl, {
            maxZoom: 22,
            minZoom: 0,
            noWrap: true,
            bounds: [[-90, -180], [90, 180]] // Empêche de chercher des tuiles à l'infini
        }).addTo(map);

        // Si on a des tuiles au zoom 5, on force le zoom pour "voir" quelque chose
        map.setView([0, 0], 5); 
    }

    document.getElementById('levelSelect').addEventListener('change', updateMap);

    map.on('click', (e) => {
        L.circleMarker(e.latlng, { color: 'red', radius: 5 }).addTo(map);
        logger(`Clic : ${e.latlng.lat.toFixed(4)}, ${e.latlng.lng.toFixed(4)}`);
    });

</script>
</body>
</html>
