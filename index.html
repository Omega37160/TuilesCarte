<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Carte Tuiles Offline</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --primary: #3b82f6;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
        }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { padding: 10px; background: var(--card); text-align: center; border-bottom: 1px solid #334155; }
        #controls { padding: 15px; display: flex; flex-direction: column; gap: 10px; background: var(--card); }
        #map { flex: 1; width: 100%; background: #000; }
        .btn { background: var(--primary); color: white; border: none; padding: 10px; border-radius: 5px; font-weight: bold; cursor: pointer; }
        select, input { padding: 10px; border-radius: 5px; border: 1px solid #334155; background: #0f172a; color: white; }
        #status { font-size: 12px; color: #94a3b8; text-align: center; }
    </style>
</head>
<body>

<header>
    <strong>CARTE TUILLES OFFLINE</strong>
</header>

<div id="controls">
    <label>1. Importer le fichier ZIP (Tuiles)</label>
    <input type="file" id="zipInput" accept=".zip">
    
    <label>2. Choisir le Niveau</label>
    <select id="levelSelect">
        <option value="RDC">RDC</option>
        <option value="N-1">N-1</option>
        <option value="N+1">N+1</option>
        <option value="N+2">N+2</option>
    </select>
    <div id="status">Prêt</div>
</div>

<div id="map"></div>

<!-- Librairies -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<script>
    // --- 1. CONFIGURATION INITIALE ---
    let map = L.map('map').setView([0, 0], 2);
    let currentLayer = null;
    const cacheName = 'offline-maps-v1';

    // Enregistrement du Service Worker
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
    }

    // --- 2. GESTION DU ZIP ET DU CACHE ---
// --- 2. GESTION DU ZIP ET DU CACHE ---
document.getElementById('zipInput').addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;

    const status = document.getElementById('status');
    status.innerText = "Extraction en cours...";
    
    try {
        const zip = await JSZip.loadAsync(file);
        const cache = await caches.open(cacheName);
        let count = 0;

        for (const [path, entry] of Object.entries(zip.files)) {
            // On vérifie si c'est un fichier image
            if (!entry.dir && path.match(/\.(png|jpg|jpeg)$/i)) {
                const blob = await entry.async('blob');
                
                // Nettoyage du chemin : 
                // On transforme en minuscule pour la cohérence
                let cleanPath = path.toLowerCase();
                
                // On enlève le dossier racine "tiles/" s'il existe
                // Utilisation d'une regex pour ignorer la casse au cas où
                cleanPath = cleanPath.replace(/^tiles\//, '');
                
                // IMPORTANT : On construit l'URL virtuelle
                const virtualUrl = window.location.origin + '/local-tiles/' + cleanPath;
                
                await cache.put(virtualUrl, new Response(blob));
                count++;
            }
        }
        
        if (count === 0) {
            status.innerText = "Erreur : Aucune image trouvée dans le ZIP. Vérifiez la structure.";
        } else {
            status.innerText = "Succès : " + count + " tuiles chargées.";
            updateMap();
        }
    } catch (err) {
        console.error(err);
        status.innerText = "Erreur : " + err.message;
    }
});

    // --- 3. AFFICHAGE DE LA CARTE ---
    function updateMap() {
        const level = document.getElementById('levelSelect').value.toLowerCase();
        
        if (currentLayer) map.removeLayer(currentLayer);

        // On construit l'URL pour correspondre à la structure interne du ZIP
        // Exemple : /local-tiles/rdc/{z}/{x}/{y}.png
        const tileUrl = window.location.origin + '/local-tiles/' + level + '/{z}/{x}/{y}.png';

        currentLayer = L.tileLayer(tileUrl, {
            maxZoom: 22,
            minZoom: 0,
            noWrap: true
        }).addTo(map);

        status.innerText = "Affichage niveau : " + level.toUpperCase();
    }

    document.getElementById('levelSelect').addEventListener('change', updateMap);

    // --- 4. GESTION DES POINTS (MARKERS) ---
    map.on('click', function(e) {
        L.circleMarker(e.latlng, { color: 'red', radius: 8 }).addTo(map);
        console.log("Point ajouté à : " + e.latlng.lat + ", " + e.latlng.lng);
    });

</script>
</body>
</html>
