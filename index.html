<!DOCTYPE html>
<html>
<head>
    <title>Mon App de Tuiles</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <h1>Explorateur de Tuiles</h1>
    <input type="file" id="zipInput" accept=".zip">
    <p id="status">En attente de fichier...</p>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script>
        // Enregistrement du Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }

        document.getElementById('zipInput').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            
            document.getElementById('status').innerText = "Extraction en cours...";
            const zip = await JSZip.loadAsync(file);
            const cache = await caches.open('offline-maps-v1');
            
            let i = 0;
            for (const [path, entry] of Object.entries(zip.files)) {
                if (!entry.dir) {
                    const blob = await entry.async('blob');
                    // On simule une URL locale
                    await cache.put('/tuiles/' + path, new Response(blob));
                    i++;
                }
            }
            document.getElementById('status').innerText = i + " tuiles enregistrées !";
        });
    </script>
</body>
</html>
